<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz Betabloqueadores</title>
<style>
body { font-family: Arial; background:#f4f6f8; text-align:center; }
.container { max-width:700px; margin:auto; background:white; padding:20px; border-radius:10px; }
button { padding:10px 15px; margin-top:10px; cursor:pointer; }
#timer { font-size:20px; font-weight:bold; }
.correct { color:green; }
.incorrect { color:red; }
</style>
</head>
<body>

<div class="container">
<h2>Quiz Betabloqueadores</h2>

<div id="start">
<input id="name" placeholder="Tu nombre">
<br><br>
<button onclick="startQuiz()">Iniciar</button>
</div>

<div id="quiz" style="display:none;">
<p id="progress"></p>
<p id="timer">30</p>
<h3 id="question"></h3>
<input id="answer" placeholder="Tu respuesta">
<br>
<button id="submitBtn" onclick="submitAnswer()">Responder</button>
<p id="feedback"></p>
<button id="nextBtn" onclick="nextQuestion()" style="display:none;">Siguiente</button>
</div>

<div id="result" style="display:none;">
<h2>Resultados</h2>
<p id="score"></p>
<div id="review"></div>
<h3>Ranking</h3>
<ul id="ranking"></ul>
<button onclick="restart()">Reintentar</button>
</div>

</div>

<script>

// NORMALIZAR TEXTO
function normalize(str){
return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

// BANCO
const questionBank = [

// (mismo banco, no lo cambio para no alargar, ya está completo)
{q:"Fármaco cardioselectivo β1 lipofílico metabolizado por CYP2D6 que reduce frecuencia cardíaca (efecto cronotrópico negativo) y puede causar depresión y bradicardia", a:["metoprolol"]},
{q:"Betabloqueador β1 con vida media larga (10-12h) que reduce gasto cardíaco al bloquear receptores β1 y permite dosificación diaria única", a:["bisoprolol"]},
{q:"Fármaco β1 hidrofílico que no atraviesa SNC, disminuye gasto cardíaco pero es menos efectivo para prevenir ictus", a:["atenolol"]},
{q:"Betabloqueador β1 de acción ultracorta usado IV en emergencias hipertensivas", a:["esmolol"]},
{q:"Fármaco no selectivo que bloquea β1 y β2 y puede causar broncoespasmo", a:["propranolol"]},
{q:"Betabloqueador no selectivo con uso como antiarrítmico", a:["sotalol"]},
{q:"Fármaco con actividad simpaticomimética intrínseca", a:["pindolol"]},

{q:"Sustancia cuya liberación disminuye al bloquear β1 renal", a:["renina"]},
{q:"Efecto inotrópico de los betabloqueadores", a:["negativo"]},
{q:"Receptor de los cardioselectivos", a:["b1","beta1","β1"]},
{q:"Neurotransmisor antagonizado", a:["catecolaminas","norepinefrina"]},

{q:"Contraindicación respiratoria absoluta", a:["asma"]},
{q:"Condición que pueden enmascarar", a:["hipoglucemia"]},
{q:"Fenómeno por suspensión brusca", a:["rebote","abstinencia"]},
{q:"Receptor que causa broncoespasmo al bloquearse", a:["b2","beta2","β2"]},
{q:"Enfermedad cutánea agravada", a:["psoriasis"]},
{q:"Trastorno AV contraindicado", a:["bloqueo"]},

{q:"Propiedad de agonismo parcial", a:["isa","actividad simpaticomimetica intrinseca"]},
{q:"Enzima que metaboliza metoprolol", a:["cyp2d6"]},
{q:"Propiedad para cruzar SNC", a:["liposolubilidad","lipofilia"]},

{q:"Tipo de angina de elección", a:["esfuerzo","exertional"]},
{q:"Beneficio post IAM", a:["supervivencia"]}

];

// VARIABLES
let questions = [];
let current = 0;
let score = 0;
let timer;
let timeLeft = 30;
let answered = false;
let userAnswers = [];
let name = "";

// INICIO
function startQuiz(){
name = document.getElementById("name").value;
if(!name) return alert("Ingresa nombre");

questions = [...questionBank].sort(()=>0.5-Math.random()).slice(0,10);

document.getElementById("start").style.display="none";
document.getElementById("quiz").style.display="block";

loadQuestion();
}

// CARGAR
function loadQuestion(){
answered = false;
timeLeft = 30;

document.getElementById("answer").value="";
document.getElementById("answer").disabled=false;
document.getElementById("submitBtn").disabled=false;

document.getElementById("feedback").innerHTML="";
document.getElementById("nextBtn").style.display="none";

document.getElementById("progress").innerText = 
"Pregunta " + (current+1) + " / 10";

document.getElementById("question").innerText = questions[current].q;

timer = setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText=timeLeft;

if(timeLeft<=0){
clearInterval(timer);
submitAnswer();
}
},1000);
}

// RESPUESTA
function submitAnswer(){

if(answered) return; // 🔒 evita doble respuesta
answered = true;

clearInterval(timer);

let ans = normalize(document.getElementById("answer").value);
let correctList = questions[current].a.map(x=>normalize(x));

let isCorrect = correctList.some(x=>ans.includes(x));

let points = Math.max(0,50-(30-timeLeft));
if(!isCorrect) points=0;

score += points;

// BLOQUEAR INPUT
document.getElementById("answer").disabled=true;
document.getElementById("submitBtn").disabled=true;

// FEEDBACK COMPLETO
if(isCorrect){
document.getElementById("feedback").innerHTML =
`<span class="correct">✅ Correcto (+${points} pts)</span>`;
}else{
document.getElementById("feedback").innerHTML =
`<span class="incorrect">❌ Incorrecto (0 pts)<br>Respuesta correcta: ${correctList[0]}</span>`;
}

userAnswers.push({
q:questions[current].q,
user:ans,
correct:correctList[0]
});

document.getElementById("nextBtn").style.display="inline";
}

// SIGUIENTE
function nextQuestion(){
current++;
if(current>=10) endQuiz();
else loadQuestion();
}

// FINAL
function endQuiz(){
document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("score").innerText =
name + " - Puntaje: " + score;

let reviewHTML="";
userAnswers.forEach(r=>{
reviewHTML += `<p><b>${r.q}</b><br>Tu respuesta: ${r.user}<br>Correcta: ${r.correct}</p>`;
});
document.getElementById("review").innerHTML=reviewHTML;

// ranking
let ranking = JSON.parse(localStorage.getItem("ranking")||"[]");
ranking.push({name,score});
ranking.sort((a,b)=>b.score-a.score);
ranking = ranking.slice(0,5);
localStorage.setItem("ranking",JSON.stringify(ranking));

let rankHTML="";
ranking.forEach(r=>{
rankHTML += `<li>${r.name} - ${r.score}</li>`;
});
document.getElementById("ranking").innerHTML=rankHTML;
}

// REINICIO
function restart(){
current=0;
score=0;
userAnswers=[];
document.getElementById("result").style.display="none";
document.getElementById("quiz").style.display="block";
questions = [...questionBank].sort(()=>0.5-Math.random()).slice(0,10);
loadQuestion();
}

</script>

</body>
</html>
