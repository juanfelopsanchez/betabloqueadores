<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz Betabloqueadores</title>

<style>
body { font-family: Arial; background:#f4f6f8; text-align:center; }
.container { max-width:700px; margin:auto; background:white; padding:20px; border-radius:10px; }
button { padding:10px 15px; margin-top:10px; cursor:pointer; }
#timer { font-size:20px; font-weight:bold; }
.correct { color:green; }
.incorrect { color:red; }
</style>

</head>
<body>

<div class="container">
<h2>Quiz Betabloqueadores</h2>

<div id="start">
<input id="name" placeholder="Tu nombre">
<br><br>
<button id="startBtn">Iniciar</button>
</div>

<div id="quiz" style="display:none;">
<p id="progress"></p>
<p id="timer">30</p>
<h3 id="question"></h3>

<input id="answer" placeholder="Tu respuesta">
<br>

<button id="submitBtn">Responder</button>

<p id="feedback"></p>

<button id="nextBtn" style="display:none;">Siguiente</button>
</div>

<div id="result" style="display:none;">
<h2>Resultados</h2>
<p id="score"></p>
<div id="review"></div>

<h3>Ranking</h3>
<ul id="ranking"></ul>

<button id="restartBtn">Reintentar</button>
</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", () => {

// -------- NORMALIZAR --------
function normalize(str){
return str.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "")
.trim();
}

// -------- BANCO --------
const questionBank = [
{q:"Fármaco cardioselectivo β1 lipofílico metabolizado por CYP2D6", a:["metoprolol"]},
{q:"Betabloqueador β1 vida media larga", a:["bisoprolol"]},
{q:"Fármaco β1 hidrofílico", a:["atenolol"]},
{q:"Betabloqueador IV ultracorto", a:["esmolol"]},
{q:"Bloqueador β1 y β2 con broncoespasmo", a:["propranolol"]},
{q:"Betabloqueador antiarrítmico", a:["sotalol"]},
{q:"Fármaco con ISA", a:["pindolol"]},
{q:"Sustancia renal disminuida", a:["renina"]},
{q:"Efecto inotrópico", a:["negativo"]},
{q:"Receptor cardioselectivo", a:["b1","beta1","β1"]},
{q:"Neurotransmisor antagonizado", a:["catecolaminas","norepinefrina"]},
{q:"Contraindicación respiratoria", a:["asma"]},
{q:"Condición enmascarada", a:["hipoglucemia"]},
{q:"Fenómeno por suspensión", a:["rebote","abstinencia"]},
{q:"Receptor broncoespasmo", a:["b2","beta2","β2"]},
{q:"Enfermedad cutánea", a:["psoriasis"]},
{q:"Trastorno AV", a:["bloqueo"]},
{q:"Propiedad ISA", a:["isa","actividad simpaticomimetica intrinseca"]},
{q:"Enzima metoprolol", a:["cyp2d6"]},
{q:"Propiedad SNC", a:["liposolubilidad","lipofilia"]},
{q:"Tipo angina", a:["esfuerzo","exertional"]},
{q:"Beneficio post IAM", a:["supervivencia"]}
];

// -------- VARIABLES --------
let questions = [];
let current = 0;
let score = 0;
let timer;
let timeLeft = 30;
let answered = false;
let userAnswers = [];
let name = "";

// -------- ELEMENTOS --------
const startBtn = document.getElementById("startBtn");
const submitBtn = document.getElementById("submitBtn");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const answerInput = document.getElementById("answer");

// -------- EVENTOS --------
startBtn.addEventListener("click", startQuiz);
submitBtn.addEventListener("click", () => submitAnswer(false));
nextBtn.addEventListener("click", nextQuestion);
restartBtn.addEventListener("click", restart);

answerInput.addEventListener("keydown", (e)=>{
if(e.key === "Enter"){
e.preventDefault();
submitAnswer(false);
}
});

// -------- FUNCIONES --------
function startQuiz(){
name = document.getElementById("name").value;
if(!name) return alert("Ingresa nombre");

questions = [...questionBank].sort(()=>Math.random()-0.5).slice(0,10);

document.getElementById("start").style.display="none";
document.getElementById("quiz").style.display="block";

loadQuestion();
}

function loadQuestion(){
answered = false;
timeLeft = 30;

answerInput.value="";
answerInput.disabled=false;
submitBtn.disabled=false;

document.getElementById("feedback").innerHTML="";
nextBtn.style.display="none";

document.getElementById("progress").innerText =
`Pregunta ${current+1} / 10`;

document.getElementById("question").innerText = questions[current].q;

document.getElementById("timer").innerText = timeLeft;

timer = setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText = timeLeft;

if(timeLeft <= 0){
clearInterval(timer);
submitAnswer(true);
}
},1000);
}

function submitAnswer(timeout){

if(answered) return;
answered = true;

clearInterval(timer);

// bloquear UI
answerInput.disabled = true;
submitBtn.disabled = true;

let ans = normalize(answerInput.value);
let correctList = questions[current].a.map(x=>normalize(x));
let correctText = questions[current].a[0];

let isCorrect = !timeout && correctList.some(x=>ans.includes(x));

let points = isCorrect ? Math.max(0,50-(30-timeLeft)) : 0;
score += points;

// FEEDBACK CORRECTO SIEMPRE
let feedbackHTML = "";

if(timeout){
feedbackHTML = `❌ Tiempo agotado (0 pts)<br><b>Respuesta correcta:</b> ${correctText}`;
}
else if(isCorrect){
feedbackHTML = `✅ Correcto (+${points} pts)`;
}
else{
feedbackHTML = `❌ Incorrecto (0 pts)<br><b>Respuesta correcta:</b> ${correctText}`;
}

document.getElementById("feedback").innerHTML = feedbackHTML;

userAnswers.push({
q:questions[current].q,
user:ans || "(sin respuesta)",
correct:correctText
});

nextBtn.style.display="inline";
}

function nextQuestion(){
current++;
if(current >= 10) endQuiz();
else loadQuestion();
}

function endQuiz(){
document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("score").innerText =
`${name} - Puntaje: ${score}`;

let reviewHTML="";
userAnswers.forEach(r=>{
reviewHTML += `<p><b>${r.q}</b><br>
Tu respuesta: ${r.user}<br>
Correcta: ${r.correct}</p>`;
});
document.getElementById("review").innerHTML = reviewHTML;

// ranking
let ranking = JSON.parse(localStorage.getItem("ranking")||"[]");
ranking.push({name,score});
ranking.sort((a,b)=>b.score-a.score);
ranking = ranking.slice(0,5);
localStorage.setItem("ranking",JSON.stringify(ranking));

let rankHTML="";
ranking.forEach(r=>{
rankHTML += `<li>${r.name} - ${r.score}</li>`;
});
document.getElementById("ranking").innerHTML = rankHTML;
}

function restart(){
current=0;
score=0;
userAnswers=[];

document.getElementById("result").style.display="none";
document.getElementById("quiz").style.display="block";

questions = [...questionBank].sort(()=>Math.random()-0.5).slice(0,10);

loadQuestion();
}

});

</script>

</body>
</html>
