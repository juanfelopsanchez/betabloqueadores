<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz Betabloqueadores</title>

<style>
body { font-family: Arial; background:#f4f6f8; text-align:center; }
.container { max-width:700px; margin:auto; background:white; padding:20px; border-radius:10px; }
button { padding:10px 15px; margin-top:10px; cursor:pointer; }
#timer { font-size:20px; font-weight:bold; }
.correct { color:green; }
.incorrect { color:red; }
</style>

</head>
<body>

<div class="container">
<h2>Quiz Betabloqueadores</h2>

<div id="start">
<input id="name" placeholder="Tu nombre">
<br><br>
<button onclick="startQuiz()">Iniciar</button>
</div>

<div id="quiz" style="display:none;">
<p id="progress"></p>
<p id="timer">30</p>
<h3 id="question"></h3>

<input id="answer" placeholder="Tu respuesta">
<br>

<button id="submitBtn" onclick="submitAnswer()">Responder</button>

<p id="feedback"></p>

<button id="nextBtn" onclick="nextQuestion()" style="display:none;">Siguiente</button>
</div>

<div id="result" style="display:none;">
<h2>Resultados</h2>
<p id="score"></p>
<div id="review"></div>

<h3>Ranking</h3>
<ul id="ranking"></ul>

<button onclick="restart()">Reintentar</button>
</div>

</div>

<script>

// -------- NORMALIZAR --------
function normalize(str){
return str.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "")
.trim();
}

// -------- BANCO --------
const questionBank = [

{q:"Fármaco cardioselectivo β1 lipofílico metabolizado por CYP2D6 que reduce frecuencia cardíaca y puede causar depresión y bradicardia", a:["metoprolol"]},

{q:"Betabloqueador β1 con vida media larga (10-12h) que permite dosis única diaria", a:["bisoprolol"]},

{q:"Fármaco β1 hidrofílico que no atraviesa SNC y reduce menos el riesgo de ictus", a:["atenolol"]},

{q:"Betabloqueador β1 de acción ultracorta IV usado en emergencias hipertensivas", a:["esmolol"]},

{q:"Fármaco no selectivo que bloquea β1 y β2 y puede causar broncoespasmo", a:["propranolol"]},

{q:"Betabloqueador no selectivo con uso principal como antiarrítmico", a:["sotalol"]},

{q:"Fármaco con actividad simpaticomimética intrínseca (agonista parcial)", a:["pindolol"]},

{q:"Sustancia producida por el riñón cuya liberación disminuye al bloquear β1", a:["renina"]},

{q:"Tipo de efecto inotrópico producido por betabloqueadores", a:["negativo"]},

{q:"Receptor adrenérgico de los cardioselectivos", a:["b1","beta1","β1"]},

{q:"Neurotransmisor simpático antagonizado", a:["catecolaminas","norepinefrina"]},

{q:"Contraindicación respiratoria absoluta de betabloqueadores", a:["asma"]},

{q:"Condición metabólica que pueden enmascarar", a:["hipoglucemia"]},

{q:"Fenómeno por suspensión abrupta del tratamiento", a:["rebote","abstinencia"]},

{q:"Receptor cuyo bloqueo causa broncoespasmo", a:["b2","beta2","β2"]},

{q:"Enfermedad cutánea autoinmune agravada", a:["psoriasis"]},

{q:"Trastorno de conducción AV contraindicado", a:["bloqueo"]},

{q:"Propiedad de agonismo parcial en betabloqueadores", a:["isa","actividad simpaticomimetica intrinseca"]},

{q:"Enzima que metaboliza metoprolol", a:["cyp2d6"]},

{q:"Propiedad que permite atravesar la barrera hematoencefálica", a:["liposolubilidad","lipofilia"]},

{q:"Tipo de angina donde son primera línea", a:["esfuerzo","exertional"]},

{q:"Principal beneficio tras infarto de miocardio", a:["supervivencia"]}

];

// -------- VARIABLES --------
let questions = [];
let current = 0;
let score = 0;
let timer;
let timeLeft = 30;
let answered = false;
let userAnswers = [];
let name = "";

// -------- INICIO --------
function startQuiz(){
name = document.getElementById("name").value;
if(!name) return alert("Ingresa nombre");

questions = [...questionBank].sort(()=>Math.random()-0.5).slice(0,10);

document.getElementById("start").style.display="none";
document.getElementById("quiz").style.display="block";

loadQuestion();
}

// -------- CARGAR --------
function loadQuestion(){
answered = false;
timeLeft = 30;

document.getElementById("answer").value="";
document.getElementById("answer").disabled=false;
document.getElementById("submitBtn").disabled=false;

document.getElementById("feedback").innerHTML="";
document.getElementById("nextBtn").style.display="none";

document.getElementById("progress").innerText =
`Pregunta ${current+1} / 10`;

document.getElementById("question").innerText = questions[current].q;

document.getElementById("timer").innerText = timeLeft;

timer = setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText = timeLeft;

if(timeLeft <= 0){
clearInterval(timer);
submitAnswer(true);
}
},1000);
}

// -------- RESPUESTA --------
function submitAnswer(timeout=false){

if(answered) return; // 🔒 BLOQUEO TOTAL
answered = true;

clearInterval(timer);

// bloquear input
document.getElementById("answer").disabled = true;
document.getElementById("submitBtn").disabled = true;

let ans = normalize(document.getElementById("answer").value);
let correctList = questions[current].a.map(x=>normalize(x));

let isCorrect = !timeout && correctList.some(x=>ans.includes(x));

let points = isCorrect ? Math.max(0,50-(30-timeLeft)) : 0;
score += points;

let correctText = questions[current].a[0];

// 🔥 FEEDBACK COMPLETO
if(timeout){
document.getElementById("feedback").innerHTML =
`❌ Tiempo agotado (0 pts)<br>Respuesta correcta: <b>${correctText}</b>`;
}
else if(isCorrect){
document.getElementById("feedback").innerHTML =
`<span class="correct">✅ Correcto (+${points} pts)</span>`;
}
else{
document.getElementById("feedback").innerHTML =
`<span class="incorrect">❌ Incorrecto (0 pts)<br>Respuesta correcta: <b>${correctText}</b></span>`;
}

userAnswers.push({
q:questions[current].q,
user:ans || "(sin respuesta)",
correct:correctText
});

document.getElementById("nextBtn").style.display="inline";
}

// -------- SIGUIENTE --------
function nextQuestion(){
current++;
if(current >= 10) endQuiz();
else loadQuestion();
}

// -------- FINAL --------
function endQuiz(){
document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";

document.getElementById("score").innerText =
`${name} - Puntaje: ${score}`;

let reviewHTML="";
userAnswers.forEach(r=>{
reviewHTML += `<p><b>${r.q}</b><br>
Tu respuesta: ${r.user}<br>
Correcta: ${r.correct}</p>`;
});
document.getElementById("review").innerHTML = reviewHTML;

// ranking
let ranking = JSON.parse(localStorage.getItem("ranking")||"[]");
ranking.push({name,score});
ranking.sort((a,b)=>b.score-a.score);
ranking = ranking.slice(0,5);
localStorage.setItem("ranking",JSON.stringify(ranking));

let rankHTML="";
ranking.forEach(r=>{
rankHTML += `<li>${r.name} - ${r.score}</li>`;
});
document.getElementById("ranking").innerHTML = rankHTML;
}

// -------- REINICIAR --------
function restart(){
current=0;
score=0;
userAnswers=[];

document.getElementById("result").style.display="none";
document.getElementById("quiz").style.display="block";

questions = [...questionBank].sort(()=>Math.random()-0.5).slice(0,10);

loadQuestion();
}

</script>

</body>
</html>
